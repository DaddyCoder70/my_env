spec_version: 1
name: AiTrade Selection-Grade RL Environment
type: space
runtime: fastapi
app: server.app:app
port: 7860

description: >
  A high-fidelity project for testing RL agents (SAC/PPO compatible)
  on multi-step trading scenarios. Features continuous action spaces
  for precise position management and a deterministic risk-adjusted 
  grading system.

version: "1.2.0"
author: DaddyCoder70

observation_space:
  type: dict
  description: >
    Hybrid observation containing a natural language 'text' report,
    a 'indicators' dictionary with normalized technical data (RSI, EMA, Vol),
    and step-wise 'metadata'.

action_space:
  type: continuous
  description: >
    Target position weight ranging from -1.0 (100% Short) to 1.0 (100% Long).
    0.0 represents a flat/neutral position.
  range: [-1, 1]

endpoints:
  health: /
  reset:  /reset
  step:   /step
  state:  /state

tasks:
  - id: trading_stable_v1
    description: >
      100-step episode in a low-volatility trending market.
      Objective: Maximize capital growth via trend following.
    steps: 100

  - id: trading_volatile_v1
    description: >
      100-step episode in a high-noise range-bound market.
      Objective: Achieve high risk-adjusted (Sharpe) returns.
    steps: 100

  - id: trading_crash_v1
    description: >
      100-step episode featuring a sudden black swan price collapse.
      Objective: Capital preservation during crash and recovery.
    steps: 100

scoring:
  reward_range: [0.01, 0.99]
  success_threshold: 0.75
  score_formula: trajectory_grade
  notes: >
    Evaluation is deterministic and based on the full trajectory.
    Metrics include Total Profit, Sharpe Ratio, and Drawdown Penalties.

constraints:
  max_runtime_seconds: 1800
  max_memory_gb: 8
  max_vcpu: 2
